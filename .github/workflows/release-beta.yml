name: Beta release

# Triggered by pushing a pre-release tag from a release/* branch, e.g.:
#   git tag -a v0.1.0-beta.1 -m "Beta 1 for 0.1.0"
#   git push origin v0.1.0-beta.1
#
# Builds the native shell in release mode and publishes a GitHub
# pre-release with the executable attached.

on:
  push:
    tags:
      - 'v*.*.*-beta*'
      - 'v*.*.*-rc*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target-native-slint
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Derive version from tag
        id: ver
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: npm run release

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "src-tauri/target-native-slint/release/native_shell.exe" \
             "dist/auricle-${{ steps.ver.outputs.version }}.exe"

      - name: Publish pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Auricle ${{ steps.ver.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: dist/auricle-${{ steps.ver.outputs.version }}.exe
